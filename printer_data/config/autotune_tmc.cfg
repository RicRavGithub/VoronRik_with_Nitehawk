# ====================================================================
# KLIPPER TMC AUTOTUNE CONFIGURATION
# ====================================================================
# This file automatically optimizes the chopper frequency, hysteresis,
# and blank time registers of your TMC5160 drivers using the physical
# constants (inductance, resistance, rated current) of your motors.
#
# NOTE: All 8 primary stepper drivers (XY AWD + Quad Z) are globally 
# configured to run on a 48V power supply for maximum performance.
# ====================================================================

# --------------------------------------------------------------------
# XY AXES - AWD GANTRY (PERFORMANCE TUNING)
# --------------------------------------------------------------------
# For a high-acceleration AWD setup, maximizing torque and preventing 
# lost steps is critical. 'tuning_goal: performance' optimizes the 
# driver for SpreadCycle, bypassing StealthChop to eliminate any 
# dynamic mode-switching lag or torque drop at high step-rates.

[autotune_tmc stepper_x]
# Target motor profile from andrewmcgr's motor_database.cfg
# !! ALWAYS VERIFY THE EXACT MODEL MATCHES YOUR HARDWARE !!
motor: ldo-42sth60-3004mah
# Forces SpreadCycle optimized for raw torque, speed, and high acceleration
tuning_goal: performance
# Matches the high-voltage bus supply for maximum high-speed EMF headroom
voltage: 48
# StallGuard4 threshold for TMC5160 Sensorless Homing (Range: -64 to 63)
# Higher = more sensitive. Only active if sensorless homing is enabled.
# sgt:1 removed as physical endstops are used

[autotune_tmc stepper_x1]
motor: ldo-42sth60-3004mah
tuning_goal: performance
voltage: 48

[autotune_tmc stepper_y]
motor: ldo-42sth60-3004mah
tuning_goal: performance
voltage: 48

[autotune_tmc stepper_y1]
motor: ldo-42sth60-3004mah
tuning_goal: performance
voltage: 48


# --------------------------------------------------------------------
# Z AXIS - QUAD Z SYSTEM (SILENT / AUTO TUNING)
# --------------------------------------------------------------------
# The Z-axis moves primarily during QGL, bed mesh calibration, and Z-hops.
# Running 48V on Z provides massive torque for heavy beds and fast QGL.
# 'tuning_goal: auto' allows StealthChop at standstill/low speeds for 
# absolute silence, while maintaining precise microstepping micro-moves.

[autotune_tmc stepper_z]
# Target motor profile for the Z axis (typically high-torque 42STH48/47 series)
motor: ldo-42sth48-2004mah
# Automatically balances between silent operation and necessary torque
tuning_goal: auto
# Configured to utilize the 48V rail for faster, high-torque Z maneuvers
voltage: 48

[autotune_tmc stepper_z1]
motor: ldo-42sth48-2004mah
tuning_goal: auto
voltage: 48

[autotune_tmc stepper_z2]
motor: ldo-42sth48-2004mah
tuning_goal: auto
voltage: 48

[autotune_tmc stepper_z3]
motor: ldo-42sth48-2004mah
tuning_goal: auto
voltage: 48


# --------------------------------------------------------------------
# EXTRUDER (TOOLHEAD TUNING)
# --------------------------------------------------------------------
# Extruder motors are typically small pancake steppers. They generate 
# substantial heat and do not benefit from 48V (standard toolhead 
# CAN boards or mainboard lines deliver 24V to the toolhead).

[autotune_tmc extruder]
# Target motor profile for the extruder (e.g., LDO NEMA 14 pancake)
motor: ldo-36sth20-1004ahg
# Auto selection ensures silent operation during retractions and steady extrusion
tuning_goal: auto
# Standard 24V power supply matching toolhead CANbus/umbilical delivery
voltage: 24