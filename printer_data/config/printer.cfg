#####################################################################
#   Drivers mapping:
#   MOTOR 1: stepper_x (Rear Left - Master)
#   MOTOR 2: stepper_z (Front Left)
#   MOTOR 3: stepper_x1 (Front Left - Slave)
#   MOTOR 4: stepper_z1 (Rear Left)
#   MOTOR 5: stepper_y (Rear Right - Master)
#   MOTOR 6: stepper_z2 (Rear Right)
#   MOTOR 7: stepper_y1 (Front Right - Slave)
#   MOTOR 8: stepper_z3 (Front Right)
#####################################################################

#####################################################################
#   Includes
#####################################################################
[include mainsail.cfg]
[include nozzle_scrub.cfg]
[include timelapse.cfg]
[include test_probe_accuracy.cfg]
[include shell_command.cfg]
[include moonraker_obico_macros.cfg]
[include printtime.cfg]
[include fan_tach_monitor.cfg]
[include autotune_tmc.cfg]

#####################################################################
#   Options
#####################################################################
[exclude_object]
[skew_correction]

#####################################################################
#   Printer
#####################################################################
[printer]
kinematics: corexy
max_velocity: 580      # !!! Old config
max_accel: 6000        # !!! Old config
#max_accel_to_decel: 6000 #25000
max_z_velocity: 30         # !!! Old config. Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 600
square_corner_velocity: 5.0

#####################################################################
#   MCUs
#####################################################################
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_41000D001551303531313638-if00
restart_method: command
[mcu rpi]
serial: /tmp/klipper_host_mcu
[mcu nhk]
serial: /dev/serial/by-id/usb-Klipper_rp2040_313436333211AB32-if00
restart_method: command

#####################################################################
#   Sensors
#####################################################################
[thermistor CMFB103F3950FANT]    # !!! Old config
temperature1: 0.0
resistance1: 32116.0
temperature2: 40.0
resistance2: 5309.0
temperature3: 80.0
resistance3: 1228.0

[temperature_sensor nh_temp]    # !!! Old config
## Nitehawk PCB Sensor
sensor_type: CMFB103F3950FANT
sensor_pin: nhk:gpio26
pullup_resistor: 2200
min_temp: 0
max_temp: 100
gcode_id: nh_th

[adxl345]    # !!! Old config
cs_pin: nhk:gpio21
spi_software_sclk_pin: nhk:gpio18
spi_software_mosi_pin: nhk:gpio20
spi_software_miso_pin: nhk:gpio19
axes_map: z,-y,x

[temperature_sensor motor_x]
sensor_type: ATC Semitec 104GT-2
sensor_pin: PB0 # Porta TH0
min_temp: 0
max_temp: 150

[temperature_sensor motor_x1]
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC5 # Porta TH1
min_temp: 0
max_temp: 150

[temperature_sensor motor_y]
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC4 # Porta TH2
min_temp: 0
max_temp: 150

[temperature_sensor motor_y1]
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA7 # Porta TH3
min_temp: 0
max_temp: 150

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor mcu]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor chamber]
sensor_type: MAX31865
sensor_pin: PG7             # Uncomment thi to use slot MOTOR_10
#sensor_pin: PG8            # Uncomment thi to use slot MOTOR_9
# HW SPI Bus shared between EZ modules of Octopus Max EZ
spi_software_sclk_pin: PE12
spi_software_mosi_pin: PE14
spi_software_miso_pin: PE13
# PT1000 Specs
rtd_nominal_r: 1000
rtd_reference_r: 4300       # Reference resistance for BTT module for PT1000
rtd_num_of_wires: 2         # Change to 3 or 4, based on PT1000 sensor wires
min_temp: 0
max_temp: 120

#####################################################################
#   Beacon Surface Scanner (Replaces Probe)
#####################################################################

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_revH_CAMBIAMI-if00 # <--- Inserisci il tuo ID seriale qui
x_offset: 0.0          # <--- Modifica in base al tuo mount (es. Xol o SB)
y_offset: 22.0         # <--- Modifica in base al tuo mount
mesh_main_direction: y
mesh_runs: 2

# Configurazione BEACON CONTACT (Sostituisce il tuo vecchio codice di sicurezza)
contact_max_hotend_temperature: 150 # Waits for hotend to be below 150°C before attempiting any physical touch
backlash_comp: 0.5                  # Mechanical backslash gantry compensation (standard initial value: 0.5)

#####################################################################
#   X/Y Stepper Settings (AWD - Alternated Layout)
#####################################################################

##  B Stepper - Rear Left (Master X)
##  Connected to MOTOR 1
[stepper_x]
step_pin: PC13
dir_pin: PC14        		   # Verifica il verso con STEPPER_BUZZ
enable_pin: !PE6
rotation_distance: 40.5        # 1.5GT belt with 27T pulley
microsteps: 32
full_steps_per_rotation: 400   # 0.9° for this Kraken motor
endstop_pin: PF2               # End Stop MIN2
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 100
homing_retract_dist: 5
homing_positive_dir: true

[tmc5160 stepper_x]
cs_pin: PG14
spi_software_miso_pin: PE13
spi_software_mosi_pin: PE14
spi_software_sclk_pin: PE12
interpolate: false
run_current: 1.80              # Starting point @48V for Kraken
sense_resistor: 0.075          # Specific for driver EZ5160
stealthchop_threshold: 0       # Disabled @48V / AWD

##  B Stepper 1 - Front Left (Slave X1)
##  Connected to MOTOR 3
[stepper_x1]
step_pin: PE1
dir_pin: PE0        # Inverti con ! se si muove al contrario
enable_pin: !PE2
rotation_distance: 40.5        # 1.5GT belt with 27T pulley
microsteps: 32
full_steps_per_rotation: 400   # 0.9° for this Kraken motor

[tmc5160 stepper_x1]
cs_pin: PG12
spi_software_miso_pin: PE13
spi_software_mosi_pin: PE14
spi_software_sclk_pin: PE12
interpolate: false
run_current: 1.80              # must be exactly the same of stepper_x
sense_resistor: 0.075          # Specific for driver EZ5160
stealthchop_threshold: 0       # Disabled @48V / AWD

#--------------------------------------------------------------------

##  A Stepper - Rear Right (Master Y)
##  Connected to MOTOR 5
[stepper_y]
step_pin: PB5
dir_pin: PB4        # Inverti con ! se si muove al contrario
enable_pin: !PB6
rotation_distance: 40.5        # 1.5GT belt with 27T pulley
microsteps: 32
full_steps_per_rotation: 400   # 0.9° for this Kraken motor
endstop_pin: PF0               # End Stop MIN1
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 100
homing_retract_dist: 5
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PG10
spi_software_miso_pin: PE13
spi_software_mosi_pin: PE14
spi_software_sclk_pin: PE12
interpolate: false
run_current: 1.80              # configured equal to stepper_x
sense_resistor: 0.075          # Specific for driver EZ5160
stealthchop_threshold: 0       # Disabled @48V / AWD

##  A Stepper 1 - Front Right (Slave Y1)
##  Connected to MOTOR 7
[stepper_y1]
step_pin: PD3
dir_pin: PD2        # Inverti con ! se si muove al contrario
enable_pin: !PD4
rotation_distance: 40.5        # 1.5GT belt with 27T pulley
microsteps: 32
full_steps_per_rotation: 400   # 0.9° for this Kraken motor

[tmc5160 stepper_y1]
cs_pin: PD7
spi_software_miso_pin: PE13
spi_software_mosi_pin: PE14
spi_software_sclk_pin: PE12
interpolate: false
run_current: 1.80              # must be exactly the same of stepper_y
sense_resistor: 0.075          # Specific for driver EZ5160
stealthchop_threshold: 0       # Always Disabled @48V / AWD

#####################################################################
#   Z Stepper Settings (Alternated Layout - LDO 0.9° @ 48V)
#####################################################################

##  Z0 Stepper - Front Left
##  Connected to MOTOR 2
[stepper_z]
step_pin: PE4
dir_pin: PE5        # Inverti con ! se si muove al contrario
enable_pin: !PE3
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
full_steps_per_rotation: 400   # 0.9° for this LDO 42STH48-2004MAH motor
endstop_pin: probe:z_virtual_endstop	# Managed by Beacon
position_max: 300
position_min: -5
homing_speed: 15
homing_retract_dist: 0         # Mandatory 0 for Beacon

[tmc5160 stepper_z]
cs_pin: PG13
spi_software_miso_pin: PE13
spi_software_mosi_pin: PE14
spi_software_sclk_pin: PE12
interpolate: false
run_current: 1.10              # Balance for LDO 42STH48-2004MAH 1.68A Peak
sense_resistor: 0.075          # Specific for EZ5160
stealthchop_threshold: 0       # Always Disabled @48V

##  Z1 Stepper - Rear Left
##  Connected to MOTOR 4
[stepper_z1]
step_pin: PB8
dir_pin: PB9        # Inverti con ! se si muove al contrario
enable_pin: !PB7
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
full_steps_per_rotation: 400   # 0.9° for this LDO 42STH48-2004MAH motor

[tmc5160 stepper_z1]
cs_pin: PG11
spi_software_miso_pin: PE13
spi_software_mosi_pin: PE14
spi_software_sclk_pin: PE12
interpolate: false
run_current: 1.10              # Balance for LDO 42STH48-2004MAH 1.68A Peak
sense_resistor: 0.075          # Specific for EZ5160
stealthchop_threshold: 0       # Always Disabled @48V

##  Z2 Stepper - Rear Right
##  Connected to MOTOR 6
[stepper_z2]
step_pin: PG15
dir_pin: PB3        # Inverti con ! se si muove al contrario
enable_pin: !PD5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
full_steps_per_rotation: 400   # 0.9° for this LDO 42STH48-2004MAH motor

[tmc5160 stepper_z2]
cs_pin: PG9
spi_software_miso_pin: PE13
spi_software_mosi_pin: PE14
spi_software_sclk_pin: PE12
interpolate: false
run_current: 1.10              # Balance for LDO 42STH48-2004MAH 1.68A Peak
sense_resistor: 0.075          # Specific for EZ5160
stealthchop_threshold: 0       # Always Disabled @48V

##  Z3 Stepper - Front Right
##  Connected to MOTOR 8
[stepper_z3]
step_pin: PA10
dir_pin: PA9        # Inverti con ! se si muove al contrario
enable_pin: !PA15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
full_steps_per_rotation: 400   # 0.9° for this LDO 42STH48-2004MAH motor

[tmc5160 stepper_z3]
cs_pin: PD6
spi_software_miso_pin: PE13
spi_software_mosi_pin: PE14
spi_software_sclk_pin: PE12
interpolate: false
run_current: 1.10              # Balance for LDO 42STH48-2004MAH 1.68A Peak
sense_resistor: 0.075          # Specific for EZ5160
stealthchop_threshold: 0       # Always Disabled @48V

#####################################################################
#   Extruder
#####################################################################

[extruder]                 # !!! Old configuration
step_pin: nhk:gpio23
dir_pin: nhk:gpio24
enable_pin: !nhk:gpio25
## Official baseline rotation distance for Bondtech LGX Lite Pro
## Update value below when you perform precise extruder calibration:
## rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
rotation_distance: 3.99

## NOTE: The internal gear ratio is already baked into the 3.99 rotation_distance by Bondtech.
## Do NOT define or uncomment a gear_ratio parameter here, as it will cause severe under-extrusion.
#gear_ratio:
microsteps: 32
full_steps_per_rotation: 200    #200 for 1.8 degree stepper (standard for LGX Lite Pro), 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: nhk:gpio9
# Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
# Use "Generic 3950" for NTC 100k 3950 thermistors
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: nhk:gpio29
pullup_resistor: 2200
min_temp: 0
max_temp: 350

max_power: 1.0
min_extrude_temp: 10
max_extrude_only_distance: 101  # Used for https://ellis3dp.com/Print-Tuning-Guide/articles/extruder_calibration.html
max_extrude_cross_section: 5
control = pid
pid_kp = 31.455
pid_ki = 5.668
pid_kd = 43.644
#  Try to keep pressure_advance below 1.0
pressure_advance: 0.045
##  Default is 0.040, leave stock
#pressure_advance_smooth_time: 0.040

##  E0 on MOTOR6
##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 extruder]
uart_pin: nhk:gpio0
tx_pin: nhk:gpio1
interpolate: false
run_current: 0.65
sense_resistor: 0.100 #0.110
stealthchop_threshold: 0

[firmware_retraction]
retract_length: 0.4
retract_speed: 35
unretract_extra_length: 0
unretract_speed: 35

#####################################################################
#   Bed Heater
#####################################################################

##  SSR Pin - HE1
##  Thermistor - TB
[heater_bed]
heater_pin: PF6 #HE0 Port
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PB1 #THB Port
##  Adjust Max Power so your heater doesn't warp your bed. Rule of thumb is 0.4 watts / cm^2 .
max_power: 0.66
min_temp: 0
max_temp: 120
control: pid
pid_kp = 43.205
pid_ki = 0.615
pid_kd = 758.243

[verify_heater heater_bed]
max_error: 999 #120
check_gain_time: 240 #60

#####################################################################
#   Fan Control
#####################################################################

##  Print Cooling Fan - FAN0
[fan]
pin: nhk:gpio6
kick_start_time: 0.5
##  Depending on your fan, you may need to increase this value
##  if your fan will not start. Can change cycle_time (increase)
##  if your fan is not able to slow down effectively
off_below: 0.10
tachometer_pin: nhk:gpio17
tachometer_ppr: 2

##  Hotend Fan - FAN1
[heater_fan hotend_fan]
pin: nhk:gpio5
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 55.0
##  If you are experiencing back flow, you can reduce fan_speed
#fan_speed: 1.0
tachometer_pin: nhk:gpio16
tachometer_ppr: 2

##  Controller fan - FAN2
[controller_fan controller_fan]
pin: PA3 #Fan3 Port
kick_start_time: 0.5
heater: heater_bed
fan_speed: 1
idle_speed: 0

[fan_generic Nevermore]
## Nevermore - FAN5 on Octopus
## Adjust if you use a different board or a different terminal.
pin: PA4 #Fan2 Port

#####################################################################
#   LED Control
#####################################################################

## Chamber Lighting - HE2 Connector (Optional)
[output_pin caselight]
pin: PA5 #Fan1 Port
pwm:true
shutdown_value: 0
value:0.20
cycle_time: 0.01

## PCB Activity Light
[output_pin act_led]
pin: !nhk:gpio8

#####################################################################
#   Other Settings
#####################################################################

[idle_timeout]
timeout: 18000

[resonance_tester]
accel_chip: adxl345
probe_points: 175, 175, 20

[input_shaper]                 # !!! Old configuration
shaper_freq_x: 51.8
shaper_freq_y: 38.8
shaper_type: mzv

[virtual_sdcard]
path: /home/ricrav/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[safe_z_home]
home_xy_position: 175, 175           # Centro perfetto del tuo piatto 350x350
z_hop: 5
z_hop_speed: 15
move_to_previous: False

[bed_mesh]
speed: 300
horizontal_move_z: 3                 # Con la Beacon puoi viaggiare vicinissimo al piatto durante la mesh
mesh_min: 40, 40                     # Verifica che (mesh_min + offset) non porti la sonda fuori dal piatto
mesh_max: 310, 310                   # Verifica che (mesh_max + offset) non porti la sonda fuori dal piatto
probe_count: 50, 50                  # Sì, una griglia 50x50! Con Beacon ci mette pochissimi secondi
algorithm: bicubic
zero_reference_position: 175, 175    # Centro del piatto, definisce lo zero assoluto della mesh

##  Use QUAD_GANTRY_LEVEL to level a gantry.
##  Min & Max gantry corners - measure from nozzle at MIN (0,0) and 
##  MAX (250, 250), (300,300), or (350,350) depending on your printer size
##  to respective belt positions
#####################################################################
#   Quad Gantry Leveling (Optimized for Beacon & Severe Gantry Sag)
#####################################################################

[quad_gantry_level]
#   Gantry Corners for 350mm Build
#   These define the physical limits of the gantry relative to the belt positions.
#   Do not change these values as they are tied to the machine's frame geometry.
gantry_corners:
   -60,-10
   410,420

#   Probe Points
#   These coordinates have been pulled inward (50mm away from edges) to safeguard the Beacon sensor.
#   Since the Beacon has a physical X/Y offset (sitting roughly 22mm ahead of the nozzle),
#   using the old close-to-edge points (like Y=0) would force the toolhead to crash into 
#   the front frame or A/B motors. These new points ensure safe clearance for the scanner.
points:
   50, 50
   50, 300
   300, 300
   300, 50

#   Travel Speed
#   The speed (in mm/s) at which the toolhead moves horizontally between the four probing points.
speed: 400

#   Z Safety Clearance Height
#   Set to 15mm specifically to handle the heavy gantry sag typical when the 4xZ motors power down.
#   If the gantry drops unevenly by 10-12mm while idle, a lower value (like 4mm or 5mm) 
#   will cause the nozzle or the Beacon body to scrape or smash violently into the bed 
#   during horizontal travel on the very first pass. If your gantry tilts even more, 
#   increase this to 20mm.
horizontal_move_z: 15

#   Maximum Probing Retries
#   The maximum number of leveling cycles Klipper will attempt to bring all four corners 
#   within the specified retry_tolerance before giving up and throwing an error.
retries: 10

#   Target Accuracy Tolerance
#   The target tolerance in mm. 0.0075mm is the golden standard for a high-performance Voron 2.4,
#   ensuring the gantry is perfectly squared and parallel to the bed before printing.
retry_tolerance: 0.0075

#   Maximum Allowed Adjustment
#   Raised to 20mm to prevent safety aborts. Because your gantry experiences extreme tilt 
#   when powered off, the first pass will require massive corrections. If this parameter 
#   is set lower than the actual physical tilt (e.g., your old 15mm limit when the gantry is tilted 18mm),
#   Klipper will instantly crash the software with a safety exception. This gives it the headroom to recover.
max_adjust: 20